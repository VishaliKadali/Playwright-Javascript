Geo location:
 is used when you want to simulate a browser’s location 
 (latitude and longitude) so that the website thinks you are browsing from that place.

This is useful for testing:

Websites or apps that depend on location-based services

Geo-specific content (e.g., weather apps, maps, delivery availability)

Region-based features or restrictions (e.g., currency, language, search results)


npx playwright test --grep "test name"  --> it will run the test which has the name mentioned in the grep

//GREP: global regular expression

If you have any title inside the test or you have saved you test 

npx playwright test --grep  login.spec.ts  --> it will run the test which has the name/title login.spec.ts
npx playwright test --grep "@smoke"  --> it will run the test which has the tag @smoke
npx playwright test --grep "@smoke|@regression"  --> it will run the test which has the tag @smoke or @regression
